name: Feature request
description: Suggest an improvement or new capability for Market Ticker.
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What workflow or limitation should this solve?
      placeholder: "Example: Portfolio entries can be edited but not removed without deleting the watchlist item."
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the behavior you want.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Optional. Describe any workaround or alternate design.
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Add screenshots, related issues, or examples if useful.

