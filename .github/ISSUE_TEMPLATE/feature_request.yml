name: Feature request
description: Suggest an improvement or new capability for Market Ticker.
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What should be added or improved?
      placeholder: "Example: Add NXT as a selectable domestic screener market."
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Add links, screenshots, examples, or implementation notes if useful.
