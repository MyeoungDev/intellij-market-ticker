# CodeRabbit Configuration
# https://docs.coderabbit.ai/guides/configure-coderabbit

language: "ko-KR"

tone_instructions: |
  리뷰는 명확하고 직접적으로 작성한다.
  문제점만 지적하는 것이 아니라 구체적인 개선 방향을 함께 제시한다.
  Kotlin 관용 표현(idiomatic Kotlin)을 권장하며, 불필요하게 Java스러운 패턴은 지양한다.
  IntelliJ Platform SDK 특유의 EDT(Event Dispatch Thread) 규칙에 민감하게 반응한다.

early_access: false

reviews:
  profile: "chill"
  request_changes_workflow: false
  high_level_summary: true
  high_level_summary_placeholder: "@coderabbitai summary"
  poem: false
  review_status: true
  collapse_walkthrough: false
  auto_review:
    enabled: true
    drafts: false
    base_branches:
      - "main"
      - "develop"

  path_instructions:
    - path: "**/domain/model/**"
      instructions: |
        도메인 모델 파일입니다. 아래 사항을 중점적으로 검토해주세요:
        - data class의 불변성(val) 유지 여부. 불필요한 var 사용은 경고.
        - nullable 타입(`?`) 사용 시 명확한 사유가 있는지 확인.
        - TODO 주석이 있는 경우 실제 이슈와 연결되었는지 확인.
        - `nationCode: String?`, `nationName: String?` 필드는 `Country` 도메인으로
          마이그레이션이 예정되어 있으므로 새 모델에서 동일 패턴 추가를 경고.
        - enum class의 `companion object`에서 `values()` 대신 `entries` 사용 권장 (Kotlin 1.9+).

    - path: "**/infrastructure/naver/**"
      instructions: |
        Naver Finance API 클라이언트 레이어입니다. 아래 사항을 중점적으로 검토해주세요:
        - 모든 네트워크 호출 전 `checkBackgroundThread()` 호출 여부 확인. EDT에서 직접 호출 금지.
        - HTTP 상태 코드 처리: 200 외의 모든 응답에 대한 적절한 처리 여부.
        - API URL이 하드코딩되어 있는 경우, 상수 또는 설정으로 분리 권장.
        - DTO 클래스는 Jackson 역직렬화를 위해 기본 생성자 또는 `@JsonCreator` 가 있는지 확인.
        - 외부 API 응답 변경에 취약한 부분은 방어 로직 추가 권장.

    - path: "**/application/provider/**"
      instructions: |
        Provider 인터페이스 레이어입니다. 아래 사항을 중점적으로 검토해주세요:
        - 인터페이스 메서드는 최소한의 책임만 가지도록 ISP(인터페이스 분리 원칙)를 확인.
        - 새로운 Provider 구현 시 기존 인터페이스를 변경하지 않도록 OCP 준수 여부 확인.

    - path: "**/ui/**"
      instructions: |
        IntelliJ UI 컴포넌트 파일입니다. 아래 사항을 중점적으로 검토해주세요:
        - UI 업데이트는 반드시 EDT에서 수행되어야 함. `ApplicationManager.getApplication().invokeLater {}` 사용 확인.
        - 무거운 작업(네트워크, 파일 I/O)은 반드시 백그라운드 스레드(CoroutineScope / ProgressManager)에서 수행.
        - `Disposable` 구현 여부: Tool Window, Widget 등은 플러그인 언로드 시 리소스 해제 필수.
        - UI 컴포넌트에서 직접 `NaverClient` / Provider를 호출하지 않도록 레이어 경계 확인.

    - path: "**/*Settings*.kt"
      instructions: |
        설정 관련 파일입니다. 아래 사항을 중점적으로 검토해주세요:
        - `PersistentStateComponent` 올바른 구현 여부.
        - 상태 클래스(State)는 기본값이 있는 mutable 필드로 구성되어야 함.
        - 민감한 정보(API Key 등)는 `PasswordSafe`를 사용해 저장.

    - path: "**/*Alert*.kt"
      instructions: |
        알림 관련 파일입니다. 아래 사항을 중점적으로 검토해주세요:
        - 동일 조건 알림의 중복 발송 방지 로직 여부.
        - `NotificationGroupManager`를 사용한 표준 IntelliJ 알림 방식 준수.
        - 알림 쿨다운(cooldown) 로직 구현 시 스레드 안전성 확인.

    - path: "**/*Test*.kt"
      instructions: |
        테스트 파일입니다. 아래 사항을 중점적으로 검토해주세요:
        - 테스트 커버리지: 도메인 모델의 비즈니스 로직, `companion object` 팩토리 메서드는 반드시 테스트.
        - NaverClient 테스트는 실제 API를 호출하지 않고 MockK 또는 MockWebServer 사용.
        - `PriceStatus.from()`, `MarketStatus.of()`, `CurrencyType.of()` 등 유틸 메서드의 엣지케이스 테스트 확인.

  abort_on_close: true

chat:
  auto_reply: true
